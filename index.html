<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staffing Analysis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.26.0/tabler-icons.min.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* ── Theme-invariant tokens ───────────────────────── */
      :root {
        --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --font-mono: "Menlo", "Consolas", monospace;

        --accent:   #A100FF;
        --us-col:   #60A5FA;
        --off-col:  #FB923C;
        --ar-col:   #C084FC;
        --success:  #10B981;
        --warning:  #F59E0B;
        --danger:   #EF4444;

        /* legacy color-* aliases (accent/status) */
        --color-accent:        #A100FF;
        --color-accent-active: #7500C0;
        --color-accent-tint:   #F2E6FF;
        --color-text-success:  #10B981;
        --color-text-danger:   #EF4444;
        --color-background-success: rgba(16,185,129,0.12);
        --color-background-danger:  rgba(239,68,68,0.12);
      }

      /* ── Dark theme (default) ─────────────────────────── */
      :root, [data-theme="dark"] {
        --bg-app:       #0F172A;
        --bg-card:      #111827;
        --bg-card2:     #1a2234;
        --bg-navbar:    #0A0A14;
        --bg-sidebar:   #080D18;
        --border:       #1E293B;
        --border-faint: rgba(255,255,255,0.08);
        --text-h:       #F8FAFC;
        --text-b:       #94A3B8;
        --text-b2:      rgba(255,255,255,0.55);
        --text-m:       rgba(255,255,255,0.35);
        --chart-grid:   #1E293B;
        --chart-tick:   rgba(255,255,255,0.35);
        --tooltip-bg:   #1a2234;
        --input-bg:     rgba(255,255,255,0.06);
        --row-alt:      rgba(255,255,255,0.03);
        --row-hover:    rgba(255,255,255,0.05);
        --upload-text:  rgba(255,255,255,0.6);
        --upload-sub:   rgba(255,255,255,0.3);

        /* legacy color-* aliases for dark */
        --color-background-primary:   #111827;
        --color-background-secondary: #1a2234;
        --color-background-tertiary:  #1E293B;
        --color-background-info:      rgba(161,0,255,0.12);
        --color-background-warning:   rgba(245,158,11,0.12);
        --color-text-primary:   #F8FAFC;
        --color-text-secondary: #94A3B8;
        --color-text-tertiary:  rgba(255,255,255,0.35);
        --color-text-info:      #C084FC;
        --color-text-warning:   #F59E0B;
        --color-border-tertiary:  #1E293B;
        --color-border-secondary: #334155;

        color-scheme: dark;
      }

      /* ── Light theme ──────────────────────────────────── */
      [data-theme="light"] {
        --bg-app:       #F0F2F5;
        --bg-card:      #FFFFFF;
        --bg-card2:     #F8FAFC;
        --bg-navbar:    #0A0A14;
        --bg-sidebar:   #F1F5F9;
        --border:       #E2E8F0;
        --border-faint: rgba(0,0,0,0.09);
        --text-h:       #0F172A;
        --text-b:       #475569;
        --text-b2:      rgba(0,0,0,0.55);
        --text-m:       rgba(0,0,0,0.45);
        --chart-grid:   #E2E8F0;
        --chart-tick:   rgba(0,0,0,0.45);
        --tooltip-bg:   #FFFFFF;
        --input-bg:     rgba(0,0,0,0.04);
        --row-alt:      rgba(0,0,0,0.03);
        --row-hover:    rgba(0,0,0,0.04);
        --upload-text:  rgba(0,0,0,0.6);
        --upload-sub:   rgba(0,0,0,0.35);

        /* legacy color-* aliases for light */
        --color-background-primary:   #FFFFFF;
        --color-background-secondary: #F5F5F5;
        --color-background-tertiary:  #EBEBEB;
        --color-background-info:      #F2E6FF;
        --color-background-warning:   #FFFBEB;
        --color-text-primary:   #0F172A;
        --color-text-secondary: #475569;
        --color-text-tertiary:  rgba(0,0,0,0.45);
        --color-text-info:      #7500C0;
        --color-text-warning:   #92400E;
        --color-border-tertiary:  #E2E8F0;
        --color-border-secondary: #CBD5E1;

        color-scheme: light;
      }

      html, body {
        min-height: 100vh;
        font-family: var(--font-sans);
        font-size: 15px;
        color: var(--text-h);
        background: var(--bg-app);
      }

      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
