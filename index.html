<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staffing Analysis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.26.0/tabler-icons.min.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --font-mono: "Menlo", "Consolas", monospace;

        /* Theme: white backgrounds, black text, purple accent */
        --color-accent:        #A100FF;
        --color-accent-active: #7500C0;
        --color-accent-tint:   #F2E6FF;

        --color-background-primary:   #FFFFFF;
        --color-background-secondary: #F5F5F5;
        --color-background-tertiary:  #EBEBEB;
        --color-background-info:      #F2E6FF;
        --color-background-success:   #F0FAF4;
        --color-background-danger:    #FEF2F2;
        --color-background-warning:   #FFFBEB;

        --color-text-primary:   #000000;
        --color-text-secondary: #444444;
        --color-text-tertiary:  #888888;
        --color-text-info:      #7500C0;
        --color-text-success:   #15803D;
        --color-text-danger:    #991B1B;
        --color-text-warning:   #92400E;

        --color-border-tertiary:  #E0E0E0;
        --color-border-secondary: #CCCCCC;
      }

      html, body {
        min-height: 100vh;
        font-family: var(--font-sans);
        font-size: 15px;
        color: var(--color-text-primary);
        background: #F5F5F5;
      }

      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
